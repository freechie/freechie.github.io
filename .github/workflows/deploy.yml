name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install validation tools
        run: sudo apt-get update && sudo apt-get install --yes tidy libxml2-utils
      - name: Validate site
        run: |
          node scripts/validate-site.mjs
          xmllint --noout site/sitemap.xml
          tidy --warn-proprietary-attributes no -errors -quiet site/index.html
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - uses: actions/deploy-pages@v4
        id: deployment
